<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeus Framework Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 0.5rem;
      font-size: 2.5rem;
    }

    header p {
      color: #7f8c8d;
      font-size: 1.1rem;
    }

    main {
      display: grid;
      gap: 3rem;
    }

    /* Counter Styles */
    .counter {
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
      border-radius: 12px;
      color: white;
    }

    .count-display {
      font-size: 1.5rem;
      margin: 1.5rem 0;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .buttons button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .buttons button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    /* Todo Styles */
    .todo-app {
      padding: 2rem;
      background: linear-gradient(135deg, #a8e6cf 0%, #4ecdc4 100%);
      border-radius: 12px;
      color: #2c3e50;
    }

    .todo-app h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #2c3e50;
    }

    .add-todo {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .add-todo input {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .add-todo input:focus {
      outline: none;
      border-color: #4ecdc4;
    }

    .add-todo button {
      padding: 0.75rem 1.5rem;
      background: #4ecdc4;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-todo button:hover {
      background: #45b7aa;
      transform: translateY(-1px);
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      backdrop-filter: blur(10px);
    }

    .remove-btn {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .remove-btn:hover {
      background: #c0392b;
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      color: #7f8c8d;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .app {
        margin: 1rem;
        padding: 1rem;
      }

      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .add-todo {
        flex-direction: column;
      }

      .todo-item {
        flex-direction: column;
        gap: 0.5rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
