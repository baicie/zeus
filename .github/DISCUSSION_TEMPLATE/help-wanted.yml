name: Help Wanted
description: Request help from the community
title: '[Help Wanted] '
labels: ['help-wanted', 'community']
body:
  - type: markdown
    attributes:
      value: |
        ## 🙋‍♀️ 需要帮助

        请描述您需要什么帮助。

  - type: textarea
    id: title
    attributes:
      label: 帮助标题
      description: 请为您的帮助请求起一个标题
      placeholder: 例如：需要帮助优化编译性能
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 详细描述
      description: 请详细描述您需要什么帮助
      placeholder: 例如：我在优化 Zeus 编译器的性能时遇到了瓶颈，希望有经验的开发者提供建议
    validations:
      required: true

  - type: textarea
    id: skills
    attributes:
      label: 需要的技能
      description: 请列出需要的技能或经验
      placeholder: |
        - 编译器开发经验
        - 性能优化经验
        - TypeScript 知识
        - 代码分析工具使用经验
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 背景信息
      description: 请提供相关的背景信息
      placeholder: 例如：当前编译器在处理大型项目时速度较慢，我们正在寻找优化方案
    validations:
      required: false

  - type: textarea
    id: current-status
    attributes:
      label: 当前状态
      description: 请描述当前的状态和进展
      placeholder: 例如：已经尝试了缓存优化，但效果不明显
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: 相关代码
      description: 如果适用，请提供相关的代码
      placeholder: |
        ```typescript
        // 相关代码
        ```
    validations:
      required: false

  - type: textarea
    id: resources
    attributes:
      label: 可用资源
      description: 请描述可用的资源和支持
      placeholder: 例如：可以提供代码访问权限、相关文档、测试环境等
    validations:
      required: false

  - type: textarea
    id: timeline
    attributes:
      label: 时间线
      description: 请提供期望的时间线
      placeholder: 例如：希望在 2 周内得到初步建议，1 个月内完成优化
    validations:
      required: false

  - type: textarea
    id: contact
    attributes:
      label: 联系方式
      description: 请提供联系方式
      placeholder: 例如：可以通过 GitHub Issues、Discussions 或邮件联系
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: 例如：相关文档链接、参考资料等
    validations:
      required: false
