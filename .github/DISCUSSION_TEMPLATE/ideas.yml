name: Ideas
description: Share ideas and suggestions for the project
title: '[Idea] '
labels: ['enhancement', 'idea']
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 想法描述

        请描述您的想法或建议。

  - type: textarea
    id: idea
    attributes:
      label: 想法/建议
      description: 请详细描述您的想法或建议
      placeholder: 例如：建议添加一个新的 API 来简化组件创建
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个想法解决了什么问题？
      placeholder: 例如：当前创建组件需要写很多样板代码，这个想法可以简化这个过程
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 请描述具体的解决方案
      placeholder: 例如：添加一个 createComponent 函数，接受配置对象并返回组件
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 请描述您考虑过的替代方案
      placeholder: 例如：也可以使用装饰器的方式，但是函数式 API 更简洁
    validations:
      required: false

  - type: textarea
    id: use-cases
    attributes:
      label: 使用场景
      description: 请描述这个想法的使用场景
      placeholder: 例如：适用于快速原型开发、组件库开发等场景
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: 代码示例
      description: 如果适用，请提供代码示例
      placeholder: |
        ```typescript
        // 使用示例
        const MyComponent = createComponent({
          name: 'my-component',
          template: '<div>{{ message }}</div>',
          data: () => ({ message: 'Hello World' })
        });
        ```
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: 例如：相关文档链接、参考资料等
    validations:
      required: false
