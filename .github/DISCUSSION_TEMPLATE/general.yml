name: General Discussion
description: General discussion about the project
title: '[Discussion] '
labels: ['discussion']
body:
  - type: markdown
    attributes:
      value: |
        ## 💬 讨论主题

        请简要描述您想要讨论的主题。

  - type: textarea
    id: topic
    attributes:
      label: 讨论主题
      description: 请详细描述您想要讨论的内容
      placeholder: 例如：如何优化编译性能、最佳实践分享等
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景信息
      description: 请提供相关的背景信息
      placeholder: 例如：当前遇到的问题、想要了解的技术点等
    validations:
      required: false

  - type: textarea
    id: questions
    attributes:
      label: 具体问题
      description: 请列出您想要讨论的具体问题
      placeholder: |
        1. 问题1
        2. 问题2
        3. 问题3
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: 代码示例
      description: 如果适用，请提供相关的代码示例
      placeholder: |
        ```typescript
        // 相关代码示例
        ```
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: 例如：相关文档链接、参考资料等
    validations:
      required: false
