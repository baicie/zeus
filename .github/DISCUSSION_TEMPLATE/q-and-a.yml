name: Q&A
description: Ask a question and get help from the community
title: '[Q&A] '
labels: ['question', 'help-wanted']
body:
  - type: markdown
    attributes:
      value: |
        ## ❓ 问题描述

        请清晰简洁地描述您的问题。

  - type: textarea
    id: question
    attributes:
      label: 问题
      description: 请详细描述您的问题
      placeholder: 例如：如何使用 Zeus 创建自定义组件？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景信息
      description: 请提供相关的背景信息
      placeholder: 例如：我正在开发一个 Web 应用，需要...
    validations:
      required: false

  - type: textarea
    id: tried
    attributes:
      label: 已尝试的解决方案
      description: 请描述您已经尝试过的解决方案
      placeholder: 例如：我尝试了...，但是...
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: 相关代码
      description: 如果适用，请提供相关的代码
      placeholder: |
        ```typescript
        // 相关代码
        ```
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供您的环境信息
      placeholder: |
        - OS: macOS/Windows/Linux
        - Node.js: 20.0.0
        - Browser: Chrome/Safari/Firefox
        - Package Version: 1.0.0
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: 例如：相关文档链接、错误日志等
    validations:
      required: false
