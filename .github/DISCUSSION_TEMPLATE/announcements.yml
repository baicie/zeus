name: Announcements
description: Share important announcements and updates
title: '[Announcement] '
labels: ['announcement', 'important']
body:
  - type: markdown
    attributes:
      value: |
        ## 📢 公告内容

        请描述您要发布的公告内容。

  - type: textarea
    id: title
    attributes:
      label: 公告标题
      description: 请为您的公告起一个标题
      placeholder: 例如：Zeus 1.0.0 正式发布
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: 公告内容
      description: 请详细描述公告内容
      placeholder: 例如：我们很高兴地宣布 Zeus 1.0.0 正式发布！这个版本包含了...
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: 重点内容
      description: 请列出重点内容或关键信息
      placeholder: |
        - 新功能：支持 TypeScript 4.5
        - 性能提升：编译速度提升 50%
        - 修复：解决了 20+ 个已知问题
    validations:
      required: false

  - type: textarea
    id: changes
    attributes:
      label: 主要变更
      description: 请列出主要变更内容
      placeholder: |
        ### 新增功能
        - 支持自定义指令
        - 新增组件库

        ### 修复问题
        - 修复内存泄漏问题
        - 修复类型定义错误

        ### 性能优化
        - 优化编译性能
        - 减少包体积
    validations:
      required: false

  - type: textarea
    id: migration
    attributes:
      label: 迁移指南
      description: 如果适用，请提供迁移指南
      placeholder: 例如：从 0.x 版本升级到 1.0.0 需要更新以下配置...
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: 相关链接
      description: 请提供相关链接
      placeholder: |
        - 发布说明：https://github.com/your-org/zeus/releases/tag/v1.0.0
        - 文档：https://your-docs-site.com
        - 示例：https://your-examples-site.com
    validations:
      required: false

  - type: textarea
    id: timeline
    attributes:
      label: 时间线
      description: 如果适用，请提供时间线信息
      placeholder: 例如：1.0.0 版本计划在 2024 年 1 月 15 日发布
    validations:
      required: false

  - type: textarea
    id: feedback
    attributes:
      label: 反馈渠道
      description: 请提供反馈渠道
      placeholder: 例如：如有问题或建议，请通过 GitHub Issues 或 Discussions 联系我们
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: 例如：感谢所有贡献者的支持
    validations:
      required: false
