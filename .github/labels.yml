# GitHub labels configuration
# This file is used by GitHub CLI to configure repository labels

labels:
  # Priority labels
  - name: 'priority: critical'
    color: 'd73a4a'
    description: 'Critical priority issue'
  - name: 'priority: high'
    color: 'ff6b6b'
    description: 'High priority issue'
  - name: 'priority: medium'
    color: 'ffa500'
    description: 'Medium priority issue'
  - name: 'priority: low'
    color: '28a745'
    description: 'Low priority issue'

  # Type labels
  - name: 'type: bug'
    color: 'd73a4a'
    description: "Something isn't working"
  - name: 'type: feature'
    color: 'a2eeef'
    description: 'New feature or request'
  - name: 'type: enhancement'
    color: '7057ff'
    description: 'Enhancement to existing feature'
  - name: 'type: documentation'
    color: '0075ca'
    description: 'Improvements or additions to documentation'
  - name: 'type: question'
    color: 'd876e3'
    description: 'Further information is requested'
  - name: 'type: discussion'
    color: 'f9d0c4'
    description: 'General discussion'

  # Status labels
  - name: 'status: needs-triage'
    color: 'fef2c0'
    description: 'Needs to be triaged'
  - name: 'status: in-progress'
    color: '0e8a16'
    description: 'Work in progress'
  - name: 'status: blocked'
    color: 'd73a4a'
    description: 'Blocked by another issue'
  - name: 'status: needs-review'
    color: 'fbca04'
    description: 'Needs review'
  - name: 'status: needs-testing'
    color: 'c2e0c6'
    description: 'Needs testing'
  - name: 'status: ready-to-merge'
    color: '0e8a16'
    description: 'Ready to merge'

  # Component labels
  - name: 'component: compiler'
    color: '1d76db'
    description: 'Compiler related'
  - name: 'component: runtime'
    color: '1d76db'
    description: 'Runtime related'
  - name: 'component: components'
    color: '1d76db'
    description: 'Components library'
  - name: 'component: wc'
    color: '1d76db'
    description: 'Web Components'
  - name: 'component: build'
    color: '1d76db'
    description: 'Build system'
  - name: 'component: docs'
    color: '1d76db'
    description: 'Documentation'

  # Size labels
  - name: 'size: xs'
    color: '3cbf00'
    description: 'Extra small'
  - name: 'size: s'
    color: '5d9801'
    description: 'Small'
  - name: 'size: m'
    color: '7f7203'
    description: 'Medium'
  - name: 'size: l'
    color: 'a14c05'
    description: 'Large'
  - name: 'size: xl'
    color: 'c32607'
    description: 'Extra large'

  # Special labels
  - name: 'good first issue'
    color: '7057ff'
    description: 'Good for newcomers'
  - name: 'help wanted'
    color: '008672'
    description: 'Extra attention is needed'
  - name: 'breaking change'
    color: 'd73a4a'
    description: 'Breaking change'
  - name: 'security'
    color: 'd73a4a'
    description: 'Security related'
  - name: 'performance'
    color: 'ff6b6b'
    description: 'Performance related'
  - name: 'accessibility'
    color: 'ff6b6b'
    description: 'Accessibility related'
  - name: 'internationalization'
    color: 'ff6b6b'
    description: 'Internationalization related'

  # Maintenance labels
  - name: 'maintenance: dependencies'
    color: '0366d6'
    description: 'Dependency updates'
  - name: 'maintenance: refactor'
    color: '0366d6'
    description: 'Code refactoring'
  - name: 'maintenance: cleanup'
    color: '0366d6'
    description: 'Code cleanup'
  - name: 'maintenance: tests'
    color: '0366d6'
    description: 'Test related'
