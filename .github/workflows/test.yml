name: 'test'

on:
  workflow_call:
    inputs:
      enable_hydration_browser_matrix:
        description: 'Run optional hydration browser matrix tests (Chromium/Firefox/WebKit)'
        required: false
        type: boolean
        default: false
      hydration_browsers:
        description: 'Comma-separated browsers for hydration matrix (chromium,firefox,webkit)'
        required: false
        type: string
        default: 'chromium'

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install

      - name: Run eslint
        run: pnpm run lint

      - name: Run prettier
        run: pnpm run format-check

      - name: Run tsc
        run: pnpm run check

      - name: Run type declaration tests
        run: pnpm run test-dts

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates -> target'

      - name: Run Rust tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-check, rust-test]
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-wasip1-threads

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates -> target'

      - run: pnpm install

      - name: Build all packages
        run: pnpm build-all

  unit-test:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-wasip1-threads

      - name: Cache dist
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            addons/*/dist
          key: dist-${{ github.sha }}
          restore-keys: dist-

      - run: pnpm install

      - name: Build all packages
        run: pnpm build-all

      - name: Run unit tests
        run: pnpm run test

  unit-test-windows:
    runs-on: windows-latest
    needs: [build]
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-wasip1-threads

      - name: Cache dist
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            addons/*/dist
          key: dist-${{ github.sha }}
          restore-keys: dist-

      - run: pnpm install

      - name: Build all packages
        run: pnpm build-all

      # - name: Run compiler unit tests
      #   run: pnpm run test-unit -- unit-compiler

  e2e-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5

      - name: Setup cache for Chromium binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Cache dist
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            addons/*/dist
          key: dist-${{ github.sha }}
          restore-keys: dist-

      - run: pnpm install
      - run: node node_modules/puppeteer/install.mjs

      - name: Run e2e tests
        run: pnpm run test-e2e

  hydration-browser-matrix:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ inputs.enable_hydration_browser_matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run hydration browser matrix tests
        run: pnpm run test-hydration-browser-matrix
        env:
          HYDRATION_BROWSERS: ${{ inputs.hydration_browsers }}

      - name: Build hydration matrix report
        run: node scripts/build-hydration-matrix-report.mjs
        env:
          HYDRATION_BROWSERS: ${{ inputs.hydration_browsers }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload hydration matrix report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydration-browser-matrix-results
          path: |
            temp/hydration-browser-matrix-results.md
            temp/hydration-browser-matrix-results.json
