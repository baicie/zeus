# Repository settings
name: zeus
description: A modern JavaScript framework
private: false
default_branch: main

# Repository features
has_issues: true
has_wiki: false
has_downloads: true

# Branch protection
branch_protection:
  main:
    enforce_admins: true
    required_status_checks:
      strict: true
      contexts: [CI]
    required_pull_request_reviews:
      required_approving_review_count: 1
    required_linear_history: true
    restrictions: null

# Templates
issue_template: .github/ISSUE_TEMPLATE/bug_report.md
pull_request_template: .github/pull_request_template.md
