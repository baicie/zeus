<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Counter - Zeus</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .card {
        background: white;
        padding: 2rem 3rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        text-align: center;
      }
      h1 { margin: 0 0 1rem; color: #333; }
      .count {
        font-size: 4rem;
        font-weight: bold;
        color: #6366f1;
        margin: 1rem 0;
      }
      .buttons { display: flex; gap: 1rem; justify-content: center; }
      button {
        padding: 0.5rem 1.5rem;
        font-size: 1.25rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        background: #6366f1;
        color: white;
      }
      button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
      button:active { transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
