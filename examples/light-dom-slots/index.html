<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light DOM Slots - Zeus</title>
    <style>
      :root {
        color: #202124;
        background: #f7f8fb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .intro {
        margin: 0 0 28px;
        color: #5f6368;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }

      z-note,
      z-dashboard-card {
        display: block;
      }

      .metric {
        margin: 0;
        font-size: 2.75rem;
        font-weight: 750;
        color: #2563eb;
      }

      .muted {
        color: #6b7280;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border: 0;
        border-radius: 8px;
        background: #111827;
        color: white;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Light DOM slots</h1>
      <p class="intro">
        Zeus 在 light DOM 模式下收集自定义元素的子节点，并投影到对应的 Slot
        位置。
      </p>

      <div class="grid">
        <z-note title="默认插槽">
          <p>没有 slot 属性的节点会进入默认插槽。</p>
          <p class="muted">多个默认节点会保持原始顺序。</p>
        </z-note>

        <z-note title="Fallback"> </z-note>

        <z-dashboard-card>
          <span slot="eyebrow">Revenue</span>
          <strong slot="title">Monthly report</strong>
          <button slot="actions" class="secondary">Export</button>
          <button slot="actions">Share</button>

          <p class="metric">$42.8k</p>
          <p class="muted">Default slot content sits in the main body.</p>

          <span slot="footer">Updated just now</span>
          <a slot="footer" class="button" href="#">Open details</a>
        </z-dashboard-card>
      </div>
    </main>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
