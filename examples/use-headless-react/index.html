<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Use Headless - React Example</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        margin: 0;
      }
      h1 {
        color: #818cf8;
        margin-bottom: 1.5rem;
      }
      h2 {
        color: #a5b4fc;
        font-size: 1rem;
        margin: 2rem 0 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .demo-section {
        margin: 1.5rem 0;
        padding: 1rem;
        background: #1e293b;
        border-radius: 8px;
        border: 1px solid #334155;
      }
      button {
        padding: 0.5rem 1rem;
        border-radius: 6px;
        border: 1px solid #6366f1;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        margin: 0.25rem;
        transition: background 0.15s;
      }
      button:hover {
        background: #6366f1;
      }
      button:disabled {
        background: #3730a3;
        cursor: not-allowed;
        opacity: 0.6;
      }
      z-button[data-variant='outline'] {
        background: transparent;
        color: #818cf8;
      }
      z-button[data-variant='ghost'] {
        background: transparent;
        border-color: transparent;
        color: #818cf8;
      }
      z-button[data-variant='ghost']:hover {
        background: #1e293b;
      }
      z-switch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #e2e8f0;
      }
      z-checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #e2e8f0;
      }
      z-tabs {
        display: block;
        margin-top: 0.5rem;
      }
      z-tab-list {
        display: flex;
        gap: 0.25rem;
        border-bottom: 1px solid #334155;
      }
      z-tab-trigger {
        padding: 0.5rem 1rem;
        cursor: pointer;
        color: #94a3b8;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      z-tab-trigger[data-active] {
        color: #818cf8;
        border-bottom-color: #818cf8;
      }
      z-tab-trigger[data-disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      z-tab-panel {
        padding: 1rem 0;
      }
      .dialog-demo {
        position: relative;
      }
      z-dialog-content {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        align-items: center;
        justify-content: center;
      }
      z-dialog-content[data-state='open'] {
        display: flex;
      }
      z-dialog-content [part='overlay'] {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
      }
      z-dialog-content [part='panel'] {
        position: relative;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 1.5rem;
        min-width: 320px;
        max-width: 480px;
      }
      z-dialog-content [part='panel'] h2 {
        margin: 0 0 0.5rem;
        color: #e2e8f0;
        text-transform: none;
        letter-spacing: 0;
      }
      z-dialog-content [part='panel'] p {
        margin: 0.5rem 0 1rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
