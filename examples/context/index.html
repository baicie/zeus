<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Context - Zeus</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f8fafc;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        color: #1e293b;
      }
      .panel {
        max-width: 560px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
      }
      .panel-header h2 {
        margin: 0;
        font-size: 1.1rem;
        color: #0f172a;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
      }
      .theme-toggle.light {
        background: #fefce8;
        border-color: #fde047;
      }
      .theme-toggle.dark {
        background: #1e293b;
        border-color: #475569;
        color: #f8fafc;
      }
      .theme-toggle button {
        padding: 0.25rem 0.75rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.15s;
      }
      .theme-toggle.light button {
        background: #6366f1;
      }
      .theme-toggle.dark button {
        background: #818cf8;
      }
      .mode-label {
        font-size: 0.85rem;
        font-weight: 500;
      }
      .user-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }
      .user-name {
        font-weight: 600;
        color: #0f172a;
      }
      .user-level {
        padding: 0.1rem 0.5rem;
        background: #ede9fe;
        color: #6d28d9;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .panel-body {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }
      .deep-child {
        padding: 0.75rem 1rem;
        background: #f1f5f9;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .deep-child p {
        margin: 0;
        color: #475569;
      }
      .panel-wc {
        padding: 1.25rem 1.5rem;
      }
      .panel-wc h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        color: #0f172a;
      }
      .panel-wc > p {
        margin: 0 0 1rem;
        font-size: 0.85rem;
        color: #64748b;
        line-height: 1.5;
      }

      /* Web Component card */
      .wc-card {
        padding: 1rem;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
      }
      .wc-card.light {
        background: #fafafa;
        border-color: #e2e8f0;
      }
      .wc-card.dark {
        background: #1e293b;
        border-color: #475569;
        color: #f8fafc;
      }
      .wc-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.75rem;
        margin-bottom: 0.75rem;
        border-bottom: 1px solid currentColor;
        border-color: inherit;
        opacity: 0.7;
        font-size: 0.85rem;
      }
      .wc-body {
        margin-bottom: 0.75rem;
      }
      .wc-body p {
        margin: 0;
        font-size: 0.9rem;
        opacity: 0.8;
      }
      .wc-footer {
        display: flex;
        gap: 0.5rem;
        font-size: 0.75rem;
        opacity: 0.6;
      }
      .wc-mode::after {
        content: ' · ';
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
