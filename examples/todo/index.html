<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Todo - Zeus</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
      }
      .container {
        max-width: 480px;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }
      h1 { margin: 0 0 1.5rem; color: #333; }
      .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
      input[type="text"] {
        flex: 1;
        padding: 0.5rem 1rem;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1rem;
      }
      input[type="text"]:focus { outline: none; border-color: #6366f1; }
      button.add {
        padding: 0.5rem 1rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
      }
      ul { list-style: none; padding: 0; margin: 0; }
      li {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid #f3f4f6;
      }
      li:last-child { border-bottom: none; }
      .todo-text { flex: 1; }
      .todo-text.done { text-decoration: line-through; color: #9ca3af; }
      button.delete {
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
